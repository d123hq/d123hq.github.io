<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="doc-title">Portfolio</title>
    <meta id="doc-desc" name="description" content="">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body  { font-family: 'Inter', system-ui, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Scrollbar */
        ::-webkit-scrollbar       { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 999px; }

        /* Typing cursor blink */
        .cursor { animation: blink 1.1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Scroll-reveal */
        .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.55s ease, transform 0.55s ease; }
        .reveal.in { opacity: 1; transform: translateY(0); }

        /* Active sidebar link indicator */
        .sb-link { position: relative; }
        .sb-link::before {
            content: '';
            position: absolute;
            left: -1.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 0;
            background: #8b5cf6;
            border-radius: 999px;
            transition: height 0.2s ease;
        }
        .sb-link.active { color: #fff; }
        .sb-link.active::before { height: 16px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased scroll-smooth">

    <!-- ── Sidebar (desktop ≥ 1024px) ──────────────────────────── -->
    <aside class="hidden lg:flex flex-col fixed inset-y-0 left-0 w-56 border-r border-zinc-800/50 px-7 py-10 gap-10">
        <div>
            <p id="sb-name" class="font-semibold text-white text-sm"></p>
            <p id="sb-role" class="text-xs text-zinc-500 mt-1.5 leading-snug"></p>
        </div>
        <nav aria-label="Site navigation">
            <ul id="sb-nav" class="flex flex-col gap-0.5 pl-7"></ul>
        </nav>
        <div id="sb-socials" class="mt-auto flex gap-2.5 items-center"></div>
    </aside>

    <!-- ── Top bar (mobile < 1024px) ───────────────────────────── -->
    <header class="lg:hidden sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-sm border-b border-zinc-800/50">
        <div class="flex items-center justify-between h-14 px-5">
            <span id="mb-name" class="mono text-sm text-white font-medium"></span>
            <button id="mb-toggle" aria-label="Toggle navigation" class="text-zinc-400 hover:text-white transition-colors p-1">
                <svg id="mb-open"  width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                <svg id="mb-close" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24" class="hidden"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <nav id="mb-menu" class="hidden border-t border-zinc-800/50 px-5 py-3" aria-label="Mobile navigation">
            <ul id="mb-nav" class="flex flex-col gap-0.5"></ul>
        </nav>
    </header>

    <!-- ── Main ─────────────────────────────────────────────────── -->
    <main class="lg:pl-56">

        <!-- Hero -->
        <section id="hero" class="min-h-screen flex items-center px-6 lg:px-14 pt-14 lg:pt-0">
            <div class="max-w-lg">
                <div id="hero-badge" class="mb-5 hidden">
                    <span class="inline-flex items-center gap-2 mono text-xs px-2.5 py-1 rounded-full border border-violet-500/20 bg-violet-500/10 text-violet-400">
                        <span class="w-1.5 h-1.5 rounded-full bg-violet-400 animate-pulse block"></span>
                        Available for hire
                    </span>
                </div>
                <h1 id="hero-name" class="text-4xl lg:text-5xl font-bold tracking-tight leading-tight mb-2"></h1>
                <div class="flex items-center gap-0.5 h-7 mb-5">
                    <span id="hero-typing" class="text-zinc-400 mono text-sm"></span>
                    <span class="cursor text-violet-400 mono text-sm">|</span>
                </div>
                <p id="hero-tagline" class="text-zinc-400 text-sm leading-relaxed mb-7 max-w-md"></p>
                <div id="hero-cta" class="flex gap-3 flex-wrap"></div>
            </div>
        </section>

        <!-- Content sections -->
        <div class="px-6 lg:px-14 pb-24 max-w-2xl space-y-20">

            <section id="about" class="scroll-mt-24 reveal">
                <h2 class="mono text-[11px] uppercase tracking-[0.14em] text-zinc-600 mb-5">About</h2>
                <div id="about-body" class="space-y-3 text-zinc-400 text-sm leading-relaxed"></div>
            </section>

            <section id="skills" class="scroll-mt-24 reveal">
                <h2 class="mono text-[11px] uppercase tracking-[0.14em] text-zinc-600 mb-5">Skills</h2>
                <div id="skills-body" class="space-y-4"></div>
            </section>

            <section id="projects" class="scroll-mt-24 reveal">
                <h2 class="mono text-[11px] uppercase tracking-[0.14em] text-zinc-600 mb-5">Projects</h2>
                <div id="projects-body" class="space-y-2"></div>
            </section>

            <section id="experience" class="scroll-mt-24 reveal">
                <h2 class="mono text-[11px] uppercase tracking-[0.14em] text-zinc-600 mb-5">Experience</h2>
                <div id="experience-body" class="space-y-6"></div>
            </section>

            <section id="education" class="scroll-mt-24 reveal">
                <h2 class="mono text-[11px] uppercase tracking-[0.14em] text-zinc-600 mb-5">Education</h2>
                <div id="education-body" class="space-y-6"></div>
            </section>

            <section id="contact" class="scroll-mt-24 reveal">
                <h2 class="mono text-[11px] uppercase tracking-[0.14em] text-zinc-600 mb-5">Contact</h2>
                <p id="contact-body" class="text-zinc-400 text-sm leading-relaxed mb-5 max-w-md"></p>
                <a id="contact-cta" href="#" class="inline-flex items-center gap-2 px-4 py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-colors">
                    Get in touch
                </a>
                <div id="contact-socials" class="flex gap-3 mt-6 flex-wrap"></div>
            </section>

        </div>

        <footer class="px-6 lg:px-14 py-7 border-t border-zinc-800/50">
            <p id="footer-txt" class="mono text-[11px] text-zinc-700"></p>
        </footer>

    </main>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
